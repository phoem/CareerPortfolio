name: Validate rebuilt resumes

on:
  workflow_call:
    inputs:
      rebuilt_manifest:
        description: 'JSON manifest emitted by the immediately preceding artifact build'
        required: true
        type: string

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out current main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: Restore exact rebuilt-artifact manifest
        env:
          REBUILT_MANIFEST: ${{ inputs.rebuilt_manifest }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = json.loads(os.environ['REBUILT_MANIFEST'])
          Path('/tmp/rebuilt.json').write_text(json.dumps(payload, indent=2) + '\n')
          PY

      - name: Validate only rebuilt resumes
        run: python scripts/validate_rebuilt_artifacts.py --manifest /tmp/rebuilt.json

      - name: Commit validation reports
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add generic/validation applications
          if git diff --cached --quiet; then
            echo 'No validation changes to commit.'
          else
            git commit -m 'Validate rebuilt resume artifacts'
            git pull --rebase origin main
            git push origin HEAD:main
          fi
