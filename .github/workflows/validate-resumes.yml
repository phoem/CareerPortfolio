name: Validate resumes

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'generic/*.md'
      - 'generic/*.docx'
      - 'generic/*.pdf'
      - 'applications/**'
      - 'scripts/validate_resume.py'
      - 'scripts/record_ats_history.py'
      - '.github/workflows/validate-resumes.yml'

permissions:
  contents: write

jobs:
  validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils jq

      - name: Validate generic resumes
        run: |
          set -e
          mkdir -p generic/validation
          for stem in \
            Jordan_Newman_Generic_Senior_Software_Engineer_Resume \
            Jordan_Newman_Generic_Software_Architect_Resume \
            Jordan_Newman_Generic_Backend_Infrastructure_Resume
          do
            python scripts/validate_resume.py \
              --resume "generic/${stem}.md" \
              --docx "generic/${stem}.docx" \
              --pdf "generic/${stem}.pdf" \
              --output "generic/validation/${stem}-ATS_REPORT.md" \
              --json-output "generic/validation/${stem}-ATS_RESULT.json"
            python scripts/record_ats_history.py \
              --result "generic/validation/${stem}-ATS_RESULT.json" \
              --history "generic/validation/${stem}-ATS_HISTORY.md"
          done

      - name: Validate targeted application resumes
        run: |
          set -e
          while IFS= read -r manifest; do
            directory="$(dirname "$manifest")"
            resume_source="$(jq -r '.artifacts[] | select(.type == "resume") | .source' "$manifest" | head -n 1)"
            job_file="$(jq -r '.job_description // "JOB_DESCRIPTION.md"' "$manifest")"
            mkdir -p "$directory/validation"
            if test -z "$resume_source" || test "$resume_source" = "null"; then
              echo "No resume artifact in $manifest; skipping."
              continue
            fi
            stem="${resume_source%.md}"
            if test -f "$directory/$job_file"; then
              python scripts/validate_resume.py \
                --resume "$directory/$resume_source" \
                --docx "$directory/${stem}.docx" \
                --pdf "$directory/${stem}.pdf" \
                --job "$directory/$job_file" \
                --output "$directory/validation/ATS_REPORT.md" \
                --json-output "$directory/validation/ATS_RESULT.json"
              python scripts/record_ats_history.py \
                --result "$directory/validation/ATS_RESULT.json" \
                --history "$directory/validation/ATS_HISTORY.md"
            else
              cat > "$directory/validation/ATS_REPORT.md" <<EOF
          # ATS Readiness Report

          Targeted validation is pending because the exact job posting has not yet been stored as \`$job_file\` in this application package.

          The validator will not reconstruct required and preferred qualifications from the tailored resume or from memory. Add the exact posting, then rerun this workflow.
          EOF
            fi
          done < <(find applications -name APPLICATION.json -print | sort)

      - name: Commit validation reports
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add generic/validation applications
          if git diff --cached --quiet; then
            echo 'No validation changes to commit.'
          else
            git commit -m 'Update ATS validation reports'
            git push
          fi
